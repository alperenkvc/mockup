version: '3.8'

services:
  # --- BACKEND API ---
  api:
    build: ./backend
    container_name: mockup-api-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
    depends_on:
      - db
      - redis

  # --- POSTGRES DATABASE ---
  db:
    image: postgres:15-alpine
    container_name: mockup-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # <--- PERSISTENCE

  # --- REDIS CACHE ---
  redis:
    image: redis:7-alpine
    container_name: mockup-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # <--- PERSISTENCE

# Define the volumes at the bottom
volumes:
  postgres_data:
  redis_data: